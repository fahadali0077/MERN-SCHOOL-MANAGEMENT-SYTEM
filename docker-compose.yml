version: '3.9'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: sms_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: sms_db
    volumes:
      - mongo_data:/data/db
    networks:
      - sms_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sms_network

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sms_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/sms_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_in_production_32chars
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production_32chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - sms_network

  # Frontend (dev)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: sms_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - sms_network

volumes:
  mongo_data:
  redis_data:

networks:
  sms_network:
    driver: bridge
